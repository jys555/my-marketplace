<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Amazing Store</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Yuklanayotgan... -->
  <div id="loading">Ma'lumotlar yuklanmoqda...</div>

  <!-- Asosiy sahifa (barcha sahifalar shu yerda o'zgaradi) -->
  <div id="main" class="hidden"></div>
  
  <!-- Ro'yxatdan o'tish modal -->
  <div id="registerModal" class="modal hidden">
    <div class="modal-content">
      <h3>Profilingizni to'ldiring</h3>
      <input type="text" id="firstName" placeholder="Ism" required>
      <input type="text" id="lastName" placeholder="Familiya">
      
      <div class="phone-input">
        <select id="countryCode">
          <option value="+998">🇺🇿 +998</option>
          <option value="+7">🇷🇺 +7</option>
          <option value="+1">🇺🇸 +1</option>
        </select>
        <input type="tel" id="phone" placeholder="90 123 45 67" required>
      </div>

      <button onclick="registerUser()">Saqlash</button>
      <button onclick="closeModal()">Bekor qilish</button>
    </div>
  </div>

  <!-- Doimiy navigatsiya paneli -->
  <nav id="navbar" class="navbar hidden">
    <button onclick="showPage('home')" class="active">🏠</button>
    <button onclick="showPage('catalog')">🛍️</button>
    <button onclick="requireRegistration(() => showPage('favorites'))">❤️</button>
    <button onclick="requireRegistration(() => showPage('cart'))">🛒</button>
    <button onclick="showPage('profile')">👤</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
